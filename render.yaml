# Render.com deployment configuration
# Docs: https://render.com/docs/render-yaml-spec
#
# Database setup:
#  Render automatically provisions a free PostgreSQL instance and injects
#  DATABASE_URL into the service environment when you attach it in the dashboard.
#  Go to: Dashboard → your service → Environment → Add Database
#
# Cron setup (external — Render free tier has no internal cron):
#  - UptimeRobot  → ping /health        every 5 min  (keeps server awake)
#  - cron-job.org → hit /trigger-fetch  every 60 min (fetches + stores jobs)

services:
  - type: web
    name: hyderabad-jobs-api
    env: python
    plan: free
    region: singapore                   # Closest region to India
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # Health check endpoint — Render uses this to confirm the service is up
    healthCheckPath: /health

    # Environment variables — set real secret values in Render dashboard
    envVars:
      - key: APP_ID
        sync: false                     # Adzuna API ID (set in Render dashboard)
      - key: APP_KEY
        sync: false                     # Adzuna API key (set in Render dashboard)
      - key: TELEGRAM_BOT_TOKEN
        sync: false                     # Optional: for future Telegram use
      - key: TELEGRAM_CHAT_ID
        sync: false                     # Optional: for future Telegram use
      - key: DATABASE_URL
        sync: false                     # Auto-injected by Render when Postgres DB is attached
      - key: FETCH_COOLDOWN_SECONDS
        value: "3600"                   # 1 hour between Adzuna fetches
      - key: MAX_STORED_JOBS
        value: "500"                    # Max rows to keep in jobs table
